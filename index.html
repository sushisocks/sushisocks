<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Invitation</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=Courier+Prime:wght@400;700&display=swap" rel="stylesheet">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
background: #0a0a0a;
display: flex;
align-items: center;
justify-content: center;
min-height: 100vh;
font-family: 'Courier Prime', monospace;
overflow: hidden;
}

.noise {
position: fixed;
inset: 0;
background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
pointer-events: none;
z-index: 10;
opacity: 0.4;
}

.vignette {
position: fixed;
inset: 0;
background: radial-gradient(ellipse at center, transparent 40%, #000 100%);
pointer-events: none;
z-index: 5;
}

.card {
position: relative;
width: 680px;
min-height: 520px;
background: #0d0c0a;
border: 1px solid #2a2520;
padding: 60px 70px;
display: flex;
flex-direction: column;
align-items: center;
gap: 28px;
animation: fadeIn 1.8s ease forwards;
opacity: 0;
}

@keyframes fadeIn {
0% { opacity: 0; transform: scale(0.97); }
100% { opacity: 1; transform: scale(1); }
}

.corner {
position: absolute;
width: 28px;
height: 28px;
border-color: #b8960c;
border-style: solid;
}
.corner.tl { top: 16px; left: 16px; border-width: 2px 0 0 2px; }
.corner.tr { top: 16px; right: 16px; border-width: 2px 2px 0 0; }
.corner.bl { bottom: 16px; left: 16px; border-width: 0 0 2px 2px; }
.corner.br { bottom: 16px; right: 16px; border-width: 0 2px 2px 0; }

.stamp-ring {
width: 80px;
height: 80px;
border: 2px solid #b8960c;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
animation: rotateSlow 12s linear infinite;
position: relative;
}

@keyframes rotateSlow {
from { transform: rotate(0deg); }
to { transform: rotate(360deg); }
}

.stamp-inner {
font-size: 26px;
animation: rotateSlow 12s linear infinite reverse;
}

.eyeline {
font-family: 'Courier Prime', monospace;
font-size: 10px;
letter-spacing: 6px;
color: #b8960c;
text-transform: uppercase;
opacity: 0.8;
animation: slideUp 1s ease 0.3s both;
}

.divider {
width: 100%;
display: flex;
align-items: center;
gap: 14px;
animation: slideUp 1s ease 0.5s both;
}

.divider-line {
flex: 1;
height: 1px;
background: linear-gradient(to right, transparent, #b8960c55, transparent);
}

.divider-diamond {
width: 6px;
height: 6px;
background: #b8960c;
transform: rotate(45deg);
flex-shrink: 0;
}

.classified {
font-size: 9px;
letter-spacing: 8px;
color: #ff3333;
text-transform: uppercase;
border: 1px solid #ff3333;
padding: 4px 16px;
animation: flicker 3s ease-in-out infinite;
}

@keyframes flicker {
0%, 100% { opacity: 1; }
92% { opacity: 1; }
93% { opacity: 0.3; }
94% { opacity: 1; }
96% { opacity: 0.5; }
97% { opacity: 1; }
}

.main-text {
font-family: 'Playfair Display', serif;
font-weight: 900;
font-size: 14px;
letter-spacing: 3px;
color: #c8b89a;
text-transform: uppercase;
text-align: center;
line-height: 1.4;
animation: slideUp 1s ease 0.7s both;
}

.headline {
font-family: 'Playfair Display', serif;
font-weight: 900;
font-size: 52px;
color: #f0e6c8;
text-align: center;
line-height: 1.0;
letter-spacing: -1px;
text-shadow: 0 0 60px #b8960c33, 0 2px 4px #00000088;
animation: slideUp 1s ease 0.9s both;
}

.headline span {
color: #b8960c;
}

.detail-box {
border: 1px solid #2a2520;
background: #111009;
padding: 18px 40px;
display: flex;
flex-direction: column;
align-items: center;
gap: 8px;
width: 100%;
animation: slideUp 1s ease 1.1s both;
}

.detail-label {
font-size: 9px;
letter-spacing: 5px;
color: #b8960c;
text-transform: uppercase;
}

.detail-value {
font-family: 'Playfair Display', serif;
font-size: 28px;
color: #f0e6c8;
letter-spacing: 2px;
}

.footer-text {
font-size: 9px;
letter-spacing: 4px;
color: #4a4540;
text-transform: uppercase;
text-align: center;
animation: slideUp 1s ease 1.3s both;
}

.red-line {
width: 40px;
height: 2px;
background: #ff3333;
animation: slideUp 1s ease 1.4s both;
}

@keyframes slideUp {
from { opacity: 0; transform: translateY(16px); }
to { opacity: 1; transform: translateY(0); }
}

.scanline {
position: absolute;
inset: 0;
background: repeating-linear-gradient(
to bottom,
transparent,
transparent 2px,
rgba(0,0,0,0.03) 2px,
rgba(0,0,0,0.03) 4px
);
pointer-events: none;
}
</style>
</head>
<body>
<div class="noise"></div>
<div class="vignette"></div>

<div class="card">
<div class="scanline"></div>
<div class="corner tl"></div>
<div class="corner tr"></div>
<div class="corner bl"></div>
<div class="corner br"></div>

<div class="stamp-ring"><div class="stamp-inner">💀</div></div>

<div class="classified">— classified —</div>

<div class="eyeline">You are needed</div>

<div class="divider">
<div class="divider-line"></div>
<div class="divider-diamond"></div>
<div class="divider-line"></div>
</div>

<div class="main-text">in the biggest</div>

<div class="headline">HEIST<br><span>EVER</span></div>

<div class="divider">
<div class="divider-line"></div>
<div class="divider-diamond"></div>
<div class="divider-line"></div>
</div>

<div class="detail-box">
<div class="detail-label">Operation Date &amp; Time</div>
<div class="detail-value">14 March · 18:30</div>
<div class="detail-value">Bulevardul Socola nr.22</div>
</div>

<div class="red-line"></div>

<div class="footer-text">do not share · do not be late · come prepared</div>
</div>

</body>
</html>
